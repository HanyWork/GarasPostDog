      value: text/plain
      description: InventoryBackOrderID is the  B.O No. if zero (N/A) else number
    - name: CompanyName
      value: marinaplt
    - name: UserToken
      value: "{{UserToken}}"
    - name: ProjectId
      value: "225096"
    - name: pageNum
      value: "1"
      disabled: true
    - name: NumberOfItemsPerPage
      value: "10"
      disabled: true
  auth: inherit

settings:
