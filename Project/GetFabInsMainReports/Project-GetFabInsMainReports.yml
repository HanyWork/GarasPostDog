info:
  name: /Project/GetFabInsMainReports
  type: http
  seq: 1

http:
  method: GET
  url: "{{BaseCoreUrl}}/Project/GetFabInsMainReports"
  headers:
    - name: ProjectId
      value: "60548"
      disabled: true
    - name: ClientId
      value: "30418"
      disabled: true
    - name: DateFrom
      value: 2019-1-1
      disabled: true
    - name: DateTo
      value: 2021-1-1
      disabled: true
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: CurrentPage
      value: "1"
    - name: NumberOfItemsPerPage
      value: "10"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var template = `\r

        <style type=\"text/css\">\r

        \    .tftable {font-size:14px;color:#333333;width:100%;border-width: 1px;border-color: #87ceeb;border-collapse: collapse;}\r

        \    .tftable th {font-size:18px;background-color:#87ceeb;border-width: 1px;padding: 8px;border-style: solid;border-color: #87ceeb;text-align:left;}\r

        \    .tftable tr {background-color:#ffffff;}\r

        \    .tftable td {font-size:14px;border-width: 1px;padding: 8px;border-style: solid;border-color: #87ceeb;}\r

        \    .tftable tr:hover {background-color:#e0ffff;}\r

        </style>\r

        \r

        <table class=\"tftable\" border=\"1\">\r

        \    <tr>\r

        \        <th>Project Name</th>\r

        \        <th>User Name</th>\r

        \        <th>Department Name</th>\r

        \        <th>Date</th>\r

        \        <th>Hour Number</th>\r

        \        <th>Evaluation</th>\r

        \        <th>Comment</th>\r

        \        <th>Request Type</th>\r

        \    </tr>\r

        \    \r

        \    {{#each response.FabInsMainData}}\r

        \        <tr>\r

        \            <td>{{ProjectName}}</td>\r

        \            <td>{{UserName}}</td>\r

        \            <td>{{DepName}}</td>\r

        \            <td>{{Date}}</td>\r

        \            <td>{{HourNum}}</td>\r

        \            <td>{{Evaluation}}</td>\r

        \            <td>{{Comment}}</td>\r

        \            <td>{{RequestType}}</td>\r

        \        </tr>\r

        \    {{/each}}\r

        </table>\r

        `;\r

        \r

        function constructVisualizerPayload() {\r

        \    return {response: res.getBody()};\r

        }\r

        \r

        // pm.visualizer.set(template, constructVisualizerPayload());"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

