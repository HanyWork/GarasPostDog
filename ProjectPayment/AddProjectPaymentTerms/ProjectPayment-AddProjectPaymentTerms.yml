  url: "{{BaseCoreUrl}}/ProjectPayment/AddProjectPaymentTerms"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
