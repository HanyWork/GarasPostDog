info:
  name: /EmailTool/GetMailsInfo
  type: http
  seq: 1

http:
  method: GET
  url: "{{BaseCoreUrl}}/EmailTool/GetMailsInfo"
  headers:
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: "{{CompanyName}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/EmailTool/GetMailsInfo"
      method: GET
      headers:
        - name: Accept
          value: text/plain
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
            "Errors": [
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              },
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              }
            ],
            "Data": {
              "NumberOfInbox": "<integer>",
              "NumberOfJunk": "<integer>",
              "NumberOfDraft": "<integer>",
              "NumberOfSent": "<integer>",
              "NumberOfArchive": "<integer>"
            }
          }
