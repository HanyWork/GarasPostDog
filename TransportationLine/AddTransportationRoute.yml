info:
  name: AddTransportationRoute
  type: http
  seq: 30

http:
  method: POST
  url: "{{BaseCoreUrl}}/api/Transportation/AddTransportationRoute"
  headers:
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: json
    data: |-
      {
        "NameOfRoute": "سيدي بشر بحري",
        "TransportationVehicleId": 6,
       // "TransportationLineId": 157,
        "TransportationLineName": "-99-عصافرة",
        "SupplierId": 3,
        //"SupplierContactPersonId": null,
        "BranchScheduleId": 4,
        "PeriodFrom": "2026-04-20",
        "PeriodTo": null,
        "ToDate": "2026-04-02T08:00:00.00Z",
        "FromoDate": "2026-04-02T20:00:00.00Z",
        "HrUserId": null,
        "LineCost": 150,
        "OneWay": true
      }
  auth: inherit

runtime:
  variables:
    - name: CompanyName
      value: garastest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
