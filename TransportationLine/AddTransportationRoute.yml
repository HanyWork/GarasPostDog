info:
  name: AddTransportationRoute
  type: http
  seq: 30

http:
  method: POST
  url: "{{BaseCoreUrl}}/api/Transportation/AddTransportationRoute"
  headers:
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: json
    data: |-
      {
        "NameOfRoute": " سيدي بشر قبلي",
        "TransportationVehicleId": 7,
        "TransportationLineId": 2,
        //"TransportationLineName": "مندره",
        "SupplierId": 3,
        //"SupplierContactPersonId": null,
        "BranchScheduleId": 4,
        "PeriodFrom": "2026-04-20",
        "PeriodTo": null,
       "ToDate": "2026-04-02T17:00:00.00Z",
       "FromoDate": "2026-04-02T08:00:00.00Z",
        // "HrUserId": null,
        "LineCost": 300,
        "OneWay": false
      }
  auth: inherit

runtime:
  variables:
    - name: CompanyName
      value: garastest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
