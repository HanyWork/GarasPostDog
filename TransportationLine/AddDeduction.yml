      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: json
    data: |-
      {
        "SupplierId": 3 ,
        "Serial":"70000002" ,
        "TransportationVehicleRouteId": 2,
        "DateOfDeduction": "2025-04-16T10:37:32.521Z",
        "DeductPerRound":160.00,
        "Cause": "ضرايب ",
        "TypeOfDedct":"Taxes"    //Taxes   //Normal
      }
