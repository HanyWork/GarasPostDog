info:
  name: AddSupplierPayment
  type: http
  seq: 53

http:
  method: POST
  url: "{{BaseCoreUrl}}/api/Transportation/AddSupplierPayment"
  headers:
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: json
    data: |-
      {
        "SupplierId": 3,
        "Payment": 1000,
        "DatePayment": "2026-03-20",
        "StartDate": "2026-04-15",         // not Required
        "TypeOfDebt": "Advance" ,   // Advance  //Normal
        "NumberOfMonths": 12             // not Required
      }
  auth: inherit

runtime:
  variables:
    - name: CompanyName
      value: garastest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
