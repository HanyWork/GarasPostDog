info:
  name: ModifyPriceOfTransportationLine
  type: http
  seq: 40

http:
  method: POST
  url: "{{BaseCoreUrl}}/api/Transportation/ModifyPriceOfTransportationLine"
  headers:
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: json
    data: |-
      {
        "IncreaseCost": 1,
        "IsPrecent": true,
        "ApproximateToFiveFlag": true,
        "ForAllLines": true,
        "TransportationLineIds": [
          1
        ],
        "CreationDate": "",
        "CreationBy": 1,
        "StartDate": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
