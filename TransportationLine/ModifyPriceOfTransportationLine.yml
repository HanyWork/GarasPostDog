info:
  name: ModifyPriceOfTransportationLine
  type: http
  seq: 40

http:
  method: POST
  url: "{{BaseCoreUrl}}/api/Transportation/ModifyPriceOfTransportationLine"
  headers:
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: json
    data: |-
      {
        "IncreaseCost": 25,
        "IsPrecent": false,
        "ApproximateToFiveFlag": true,
        "ForAllLines": true,
      //   "TransportationLineIds": [
      //     1
      //   ],
       // "CreationDate": "2026-05-05T00:03:54.059Z",
       // "CreationBy": 1,
        "StartDate": "2026-04-05T00:03:54.059Z"
      }
  auth: inherit

runtime:
  variables:
    - name: CompanyName
      value: garastest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
