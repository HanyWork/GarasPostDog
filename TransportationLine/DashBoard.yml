info:
  name: DashBoard
  type: http
  seq: 8

http:
  method: GET
  url: "{{BaseCoreUrl}}/api/Transportation/DashBoard"
  headers:
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
    - name: TransportionlineId
      value: "76"
      disabled: true
    - name: SupplierId
      value: "3"
    - name: supplierContactPersonId
      value: ""
      disabled: true
    - name: DateSerach
      value: 2026-03-25
    - name: serialBus
      value: "4"
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: CompanyName
      value: garastest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
