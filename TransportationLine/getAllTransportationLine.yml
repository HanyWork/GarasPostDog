info:
  name: getAllTransportationLine
  type: http
  seq: 1

http:
  method: GET
  url: "{{BaseCoreUrl}}/api/Transportation/getAllTransportationLine"
  headers:
    - name: CompanyName
      value: "{{companyname}}"
    - name: UserToken
      value: "{{UserToken}}"
    - name: PageNo
      value: "1"
    - name: NoOfItems
      value: "2"
  auth: inherit

runtime:
  variables:
    - name: CompanyName
      value: garastest

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
