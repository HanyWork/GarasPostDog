info:
  name: /HR/Salary/AddSalaryAllownces
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/HR/Salary/AddSalaryAllownces"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: periti
  body:
    type: json
    data: |-
      {
        "salaryAllowncesList": [
          {
              "SalaryID": 25,
              "AllowncesTypeID": 1,
              "Amount": 25.3,
              "percentage": 2.5
          },
          {
            "SalaryID": 26,
            "AllowncesTypeID": 1,
            "Amount": 26.3,
            "percentage": 12.5
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

