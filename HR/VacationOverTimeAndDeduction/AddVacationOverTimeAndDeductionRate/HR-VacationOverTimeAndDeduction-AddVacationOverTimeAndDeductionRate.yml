  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/HR/VacationOverTimeAndDeduction/AddVacationOverTimeAndDeductionRate"
  headers:
    - name: Content-Type
      value: multipart/form-data
    - name: Accept
      value: text/plain
    - name: CompanyName
      value: garastest
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: multipart-form
    data:
      - name: Id
        type: text
        value: <long>
        disabled: true
      - name: dtos[0].From
        type: text
        value: 12:00 PM
      - name: dtos[0].To
        type: text
        value: 2:00 PM
      - name: dtos[0].Rate
        type: text
        value: "1.4"
      - name: dtos[0].VacationDayId
        type: text
        value: "13"
      - name: dtos[0].Active
        type: text
        value: "true"
      - name: dtos[0].BranchId
        type: text
        value: "2"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

