info:
  name: /HR/Department/AddDepartment
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/HR/Department/AddDepartment"
  headers:
    - name: Content-Type
      value: multipart/form-data
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: garastest
  body:
    type: multipart-form
    data:
      - name: Id
        type: text
        value: <integer>
        disabled: true
      - name: Name
        type: text
        value: Administration Department
      - name: BranchId
        type: text
        value: "4"
      - name: Active
        type: text
        value: <boolean>
        disabled: true
      - name: Teams[0].Name
        type: text
        value: Security Team
      - name: Teams[0].HrUsersIds[0]
        type: text
        value: "4"
      - name: Teams[0].HrUsersIds[1]
        type: text
        value: "5"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/HR/Department/AddDepartment"
      method: POST
      headers:
        - name: Content-Type
          value: multipart/form-data
        - name: Accept
          value: text/plain
      body:
        type: multipart-form
        data:
          - name: Id
            type: text
            value: <integer>
          - name: Name
            type: text
            value: <string>
          - name: BranchId
            type: text
            value: <integer>
          - name: Active
            type: text
            value: <boolean>
          - name: Teams
            type: text
            value: "[object Object],[object Object]"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
            "Errors": [
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              },
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              }
            ],
            "ID": "<integer>"
          }
