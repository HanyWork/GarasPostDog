    request:
      url: "{{baseUrl}}/HR/Branch/DeleteBranch?BranchId=<integer>"
      method: POST
      headers:
        - name: Accept
          value: text/plain
      params:
        - name: BranchId
          value: <integer>
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
            "Errors": [
              {
                "ErrorMSG": "<string>",
