info:
  name: /HR/Branch/DeleteBranch
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/HR/Branch/DeleteBranch"
  headers:
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: PERITI
    - name: BranchId
      value: "3"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
