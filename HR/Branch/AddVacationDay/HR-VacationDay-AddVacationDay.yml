info:
  name: /HR/VacationDay/AddVacationDay
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/HR/Branch/AddVacationDay"
  headers:
    - name: Content-Type
      value: multipart/form-data
    - name: Accept
      value: text/plain
    - name: CompanyName
      value: PERITI
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: multipart-form
    data:
      - name: Id
        type: text
        value: <long>
        disabled: true
      - name: ArName
        type: text
        value: Egaza check2
      - name: EngName
        type: text
        value: Vacation2
      - name: OtherName
