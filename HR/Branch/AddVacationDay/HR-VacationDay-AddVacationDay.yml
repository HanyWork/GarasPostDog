        value: 12:00 AM
      - name: OverTimeDeductionRates[1].To
        type: text
        value: 5:00 AM
      - name: OverTimeDeductionRates[1].Rate
        type: text
        value: "1.4"
      - name: OverTimeDeductionRates[1].Active
        type: text
        value: "true"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

