        value: "true"
      - name: IsDeducted
        type: text
        value: "false"
      - name: AllowOverTime
        type: text
        value: "true"
      - name: AllowDelayingDeduction
        type: text
        value: "true"
      - name: AllowAutomaticCalculations
        type: text
        value: "false"
      - name: From
        type: text
        value: 2025-2-12
      - name: To
        type: text
        value: 2025-2-12
      - name: Active
        type: text
        value: "true"
      - name: BranchId
        type: text
        value: "1"
