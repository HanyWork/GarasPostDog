info:
  name: /HR/Attendance/AddNewAttendanceRecord
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/HR/Attendance/AddNewAttendanceRecord"
  headers:
    - name: Content-Type
      value: multipart/form-data
    - name: Accept
      value: text/plain
    - name: CompanyName
      value: PERITI
    - name: UserToken
      value: "{{UserToken}}"
  body:
    type: multipart-form
    data:
      - name: HrUserId
        type: text
        value: "11"
      - name: Checkin
        type: text
        value: 08:00 AM
      - name: CheckOut
        type: text
        value: 05:15 PM
      - name: date
        type: text
        value: 2025-7-16
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

