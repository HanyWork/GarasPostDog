info:
  name: /Medical/GeMedicalDashboard
  type: http
  seq: 1

http:
  method: GET
  url: "{{BaseCoreUrl}}/Medical/GetMedicalDashboard"
  headers:
    - name: year
      value: <integer>
      disabled: true
    - name: month
      value: <integer>
      disabled: true
    - name: day
      value: <integer>
      disabled: true
    - name: From
      value: 2025-1-1
    - name: To
      value: 2025-5-12
    - name: OfferType
      value: ExtClinics
    - name: OfferTypeReturn
      value: ExtClinics Return
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: stmark
    - name: Accept
      value: text/plain
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/Medical/GetInternalTicketDashboard"
      method: GET
      headers:
        - name: year
          value: <integer>
        - name: month
          value: <integer>
        - name: day
          value: <integer>
        - name: From
          value: <dateTime>
        - name: To
          value: <dateTime>
        - name: OfferType
          value: <string>
        - name: OfferTypeReturn
          value: <string>
        - name: Accept
          value: text/plain
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
            "Errors": [
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              },
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              }
            ],
            "Data": {
              "Day": {
                "Count": "<integer>",
                "Sum": "<double>"
              },
              "Month": {
                "Count": "<integer>",
                "Sum": "<double>"
              },
              "Year": {
                "Count": "<integer>",
                "Sum": "<double>"
              },
              "Duration": {
                "Count": "<integer>",
                "Sum": "<double>"
              }
            }
          }
