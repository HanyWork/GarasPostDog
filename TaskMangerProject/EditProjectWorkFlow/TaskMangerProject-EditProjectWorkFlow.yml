info:
  name: /TaskMangerProject/EditProjectWorkFlow
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/TaskMangerProject/EditProjectWorkFlow"
  headers:
    - name: Content-Type
      value: multipart/form-data
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: garastest
  body:
    type: multipart-form
    data:
      - name: ProjectID
        type: text
        value: "1"
      - name: WorkFlowList[0].Id
        type: text
        value: ""
      - name: WorkFlowList[0].Name
        type: text
        value: ""
      - name: WorkFlowList[0].OrderNum
        type: text
        value: ""
      - name: WorkFlowList[0].Active
        type: text
        value: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/TaskMangerProject/EditProjectWorkFlow"
      method: POST
      headers:
        - name: Content-Type
          value: multipart/form-data
        - name: Accept
          value: text/plain
      body:
        type: multipart-form
        data:
          - name: ProjectID
            type: text
            value: <long>
          - name: WorkFlowList
            type: text
            value: "[object Object],[object Object]"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
