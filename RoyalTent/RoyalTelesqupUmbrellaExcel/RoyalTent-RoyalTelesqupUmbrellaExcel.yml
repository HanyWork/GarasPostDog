          value: <string>
        - name: Size
          value: <string>
        - name: Paint
          value: <string>
        - name: Cloth
          value: <string>
        - name: Fronton
          value: <string>
        - name: Accept
          value: text/plain
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
