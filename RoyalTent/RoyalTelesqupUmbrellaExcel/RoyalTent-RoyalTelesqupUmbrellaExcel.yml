info:
  name: /RoyalTent/RoyalTelesqupUmbrellaExcel
  type: http
  seq: 1

http:
  method: GET
  url: "{{BaseCoreUrl}}/RoyalTent/RoyalTelesqupUmbrellaExcel"
  headers:
    - name: Sales
      value: "%D9%82%D8%B7%D8%A7%D8%B9%D9%8A"
    - name: Size
      value: 4*4
    - name: Cloth
      value: hdpe
    - name: Fronton
      value: single
    - name: Paint
      value: "%D8%B3%D8%A7%D8%AF%D8%A9"
    - name: Accept
      value: text/plain
    - name: CompanyName
      value: "{{CompanyName}}"
    - name: UserToken
      value: "{{UserToken}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/RoyalTent/RoyalTelesqupUmbrellaExcel"
      method: GET
      headers:
