info:
  name: /ProjectCheque/EditBankChequeTemplate
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/ProjectCheque/EditBankChequeTemplate"
  headers:
    - name: Content-Type
      value: multipart/form-data
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: stmark
  body:
    type: multipart-form
    data:
      - name: BankName
        type: text
        value: QNB
        description: "(Required) "
      - name: Id
        type: text
        value: "3"
      - name: Template
        type: file
        value:
          - /D:/a10.png
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/ProjectCheque/EditBankChequeTemplate"
      method: POST
      headers:
        - name: Content-Type
          value: multipart/form-data
        - name: Accept
          value: text/plain
      body:
        type: multipart-form
        data:
          - name: BankName
            type: text
            value: <string>
            description: "(Required) "
          - name: Id
            type: text
            value: <integer>
          - name: Template
            type: file
            value: []
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
            "Errors": [
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              },
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              }
            ],
            "ID": "<integer>"
          }
