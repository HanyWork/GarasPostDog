info:
  name: /ApplicationVersion/GetApplicationVersion
  type: http
  seq: 1

http:
  method: GET
  url: "{{BaseCoreUrl}}/ApplicationVersion/GetApplicationVersion"
  headers:
    - name: CompanyName
      value: Periti
    - name: UserToken
      value: "{{UserToken}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/RoyalTent/RoyalTelesqupUmbrellaExcel"
      method: GET
      headers:
        - name: Sales
          value: <string>
        - name: Size
          value: <string>
        - name: Paint
          value: <string>
        - name: Cloth
          value: <string>
        - name: Fronton
          value: <string>
        - name: Accept
          value: text/plain
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
            "Message": "<string>",
            "Errors": [
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              },
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              }
            ],
            "TotalPrice": "<double>",
            "MeterPrice": "<double>"
          }
