info:
  name: /JobTitle/AddJobTitle
  type: http
  seq: 1

http:
  method: POST
  url: "{{BaseCoreUrl}}/JobTitle/AddJobTitle"
  headers:
    - name: Content-Type
      value: multipart/form-data
    - name: Accept
      value: text/plain
    - name: UserToken
      value: "{{UserToken}}"
    - name: CompanyName
      value: PERITI
  body:
    type: multipart-form
    data:
      - name: JobTitleName
        type: text
        value: test453
      - name: hourlyRate
        type: text
        value: "25"
      - name: currency
        type: text
        value: "1"
      - name: Description
        type: text
        value: test
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{baseUrl}}/JobTitle/AddJobTitle"
      method: POST
      headers:
        - name: Content-Type
          value: multipart/form-data
        - name: Accept
          value: text/plain
      body:
        type: multipart-form
        data:
          - name: JobTitleName
            type: text
            value: <string>
          - name: hourlyRate
            type: text
            value: <double>
          - name: currency
            type: text
            value: <string>
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "Result": "<boolean>",
            "Errors": [
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              },
              {
                "ErrorMSG": "<string>",
                "ErrorCode": "<string>"
              }
            ],
            "ID": "<long>"
          }
